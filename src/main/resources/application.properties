spring.application.name=eleuterio

# ============================================================
# SERVIDOR
# ============================================================
server.port=8080

# ============================================================
# BASE DE DATOS — PostgreSQL
# ============================================================
# Cambia estos valores según tu configuración local de PostgreSQL:
#   - host: localhost
#   - puerto: 5432 (por defecto)
#   - nombre de la BD: eleuteriodb (créala tú en pgAdmin o psql)
#   - usuario: postgres (o el tuyo)
#   - contraseña: la tuya
spring.datasource.url=postgresql://postgres:mk4xVXwskVbIYc09@db.dsuxpmhvlnfigfgjjnmx.supabase.co:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=mk4xVXwskVbIYc09
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================
# HIBERNATE / JPA
# ============================================================
# create-drop: crea las tablas al iniciar y las elimina al cerrar (útil en desarrollo)
# update: actualiza el esquema sin borrar datos (recomendado después de la primera ejecución)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ============================================================
# SWAGGER UI (Documentación de la API)
# ============================================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
# Permitir acceso a Swagger sin autenticación
springdoc.api-docs.path=/v3/api-docs

# ============================================================
# JWT — Seguridad de Tokens
# ============================================================
# Clave secreta para firmar los tokens (mínimo 256 bits = 32 caracteres)
app.jwt.secret=EleuterioAbarrotesSecretKeyMuySegura2024SpringBoot
# Tiempo de expiración del token en milisegundos (86400000 = 24 horas)
app.jwt.expiration=86400000
